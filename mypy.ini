[mypy]
python_version = 3.11
files = launch.py, client, server, shared
explicit_package_bases = True

# Third-party packages (PyQt5, faker, webcolors, ...) ship no type information,
# so don't fail on their imports while typing our own code.
ignore_missing_imports = True

# Catch the easy mistakes without demanding full strictness on a first pass.
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
warn_unused_configs = True

[mypy-tests.*]
ignore_errors = True

# PyQt5's bundled stubs model Qt's enums as nested classes, but at runtime 5.15
# still exposes them flattened (Qt.AlignVCenter, QEvent.KeyPress, ...), so the
# stubs disagree with every real use. Treat PyQt5 as untyped rather than litter
# the GUI with false positives.
[mypy-PyQt5.*]
follow_imports = skip
follow_imports_for_stubs = True
ignore_missing_imports = True
